name: Fetch Swedish Funding Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install requests beautifulsoup4 lxml deep-translator --quiet

      # ── Vinnova ────────────────────────────────────────────────────────────
      - name: Fetch Vinnova API
        run: |
          python3 - <<'PYEOF'
          import requests, json, datetime

          today = datetime.date.today().isoformat()
          try:
              r = requests.get("https://data.vinnova.se/api/ansokningsomgangar/",
                               headers={"Accept": "application/json"}, timeout=30)
              r.raise_for_status()
              raw = r.json()
          except Exception as e:
              print(f"Vinnova API error: {e}")
              raw = []

          items = raw if isinstance(raw, list) else raw.get("items", raw.get("data", []))
          print(f"Vinnova raw items: {len(items)}")
          if items:
              print("Fields:", list(items[0].keys()))

          calls = []
          for c in items:
              closes = (c.get("Stangningsdatum") or "").strip()[:10]
              opens  = (c.get("Oppningsdatum")   or "").strip()[:10]
              if closes and closes < today:
                  continue
              title_en = (c.get("TitelEngelska") or "").strip()
              title_sv = (c.get("Titel")         or "").strip()
              url = ""
              for lank in (c.get("LankLista") or []):
                  href = lank.get("Url") or lank.get("url") or lank.get("Lank") or ""
                  if href:
                      url = href; break
              calls.append({
                  "id":          c.get("Diarienummer") or "",
                  "title":       title_en or title_sv,
                  "title_en":    title_en,
                  "url":         url,
                  "opens":       opens,
                  "closes":      closes,
                  "status":      "Open",
                  "description": (c.get("BeskrivningEngelska") or c.get("Beskrivning") or "")[:400],
                  "category":    "",
                  "source":      "vinnova",
              })

          with open("vinnova_raw.json", "w", encoding="utf-8") as f:
              json.dump(calls, f, ensure_ascii=False, indent=2)
          print(f"✓ Vinnova: {len(calls)} open calls")
          PYEOF

      # ── Energimyndigheten ──────────────────────────────────────────────────
      - name: Scrape Energimyndigheten
        run: |
          python3 - <<'PYEOF'
          import requests, json, re, datetime
          from bs4 import BeautifulSoup

          today = datetime.date.today().isoformat()
          BASE = "https://www.energimyndigheten.se"
          SV_MONTHS = {"januari":"01","februari":"02","mars":"03","april":"04","maj":"05",
                       "juni":"06","juli":"07","augusti":"08","september":"09","oktober":"10",
                       "november":"11","december":"12"}
          CATEGORY_MAP = {
              "Forskningsstöd":               "Research funding",
              "Affärsutveckling":             "Business development",
              "Impact Innovation":            "Impact Innovation",
              "Strategiska innovationsprogram":"Strategic innovation programmes",
              "Internationella utlysningar":  "International calls",
              "Tävlingar":                    "Competitions",
              "Övrigt":                       "Other",
          }

          calls = []
          seen  = set()

          for page in range(1, 10):
              url = f"{BASE}/utlysningar/" if page == 1 else f"{BASE}/utlysningar?page={page}"
              try:
                  r = requests.get(url, timeout=20, headers={"User-Agent": "Mozilla/5.0"})
              except Exception as e:
                  print(f"Page {page} error: {e}"); break
              if not r.ok:
                  print(f"Page {page} HTTP {r.status_code}"); break

              soup = BeautifulSoup(r.text, "lxml")
              found = 0
              for a in soup.select("a[href*='/utlysningar/']"):
                  href = a.get("href", "")
                  if not href or href.rstrip("/") in ("/utlysningar", "") \
                          or "?" in href or "#" in href:
                      continue
                  full_url = (BASE + href) if href.startswith("/") else href
                  if full_url in seen:
                      continue
                  seen.add(full_url)

                  h = a.find(["h1", "h2", "h3", "h4"])
                  if not h:
                      continue
                  title = h.get_text(" ", strip=True)
                  if not title or len(title) < 5:
                      continue

                  paras = [p.get_text(" ", strip=True) for p in a.find_all("p")]
                  date_text = paras[0] if paras else ""
                  cat_sv    = paras[1] if len(paras) > 1 else ""
                  desc      = paras[2] if len(paras) > 2 else ""

                  closes_iso = ""
                  m = re.search(r"(\d{1,2})\s+(\w+)\s+(\d{4})", date_text)
                  if m:
                      d, mo_sv, y = m.group(1), m.group(2).lower(), m.group(3)
                      mo = SV_MONTHS.get(mo_sv, "")
                      if mo:
                          closes_iso = f"{y}-{mo}-{int(d):02d}"

                  if closes_iso and closes_iso < today:
                      continue

                  calls.append({
                      "id":          "",
                      "title":       title,
                      "title_en":    "",
                      "url":         full_url,
                      "opens":       "",
                      "closes":      closes_iso,
                      "status":      "Open",
                      "description": desc,
                      "category":    CATEGORY_MAP.get(cat_sv, cat_sv),
                      "source":      "energimyndigheten",
                  })
                  found += 1

              print(f"Energimyndigheten page {page}: {found} new, total {len(calls)}")
              if found == 0:
                  break

          with open("energi_raw.json", "w", encoding="utf-8") as f:
              json.dump(calls, f, ensure_ascii=False, indent=2)
          print(f"✓ Energimyndigheten: {len(calls)} open calls")
          PYEOF

      # ── Formas ────────────────────────────────────────────────────────────
      - name: Scrape Formas
        run: |
          python3 - <<'PYEOF'
          import requests, json, re, datetime
          from bs4 import BeautifulSoup

          today   = datetime.date.today().isoformat()
          BASE    = "https://formas.se"
          HEADERS = {"User-Agent": "Mozilla/5.0"}

          r = requests.get(f"{BASE}/en/start-page/apply-for-funding/", timeout=20, headers=HEADERS)
          soup = BeautifulSoup(r.text, "lxml")

          seen       = set()
          call_links = []
          for a in soup.find_all("a", href=True):
              href = a["href"]
              if "/all-calls/calls/" not in href:
                  continue
              full_url = (BASE + href) if href.startswith("/") else href
              if full_url in seen:
                  continue
              seen.add(full_url)
              title = a.get_text(" ", strip=True)
              if title and len(title) >= 5:
                  call_links.append((full_url, title))

          print(f"Found {len(call_links)} Formas calls")

          calls = []
          for url, title in call_links:
              closes_iso = ""
              try:
                  dr = requests.get(url, timeout=20, headers=HEADERS)
                  m = re.search(r"Last\s+day\s+of\s+application[:\s]+(\d{4}-\d{2}-\d{2})", dr.text, re.I)
                  if m:
                      closes_iso = m.group(1)
              except Exception as e:
                  print(f"  detail error {url}: {e}")

              if closes_iso and closes_iso < today:
                  continue

              calls.append({
                  "id":          "",
                  "title":       title,
                  "title_en":    title,
                  "url":         url,
                  "opens":       "",
                  "closes":      closes_iso,
                  "status":      "Open",
                  "description": "",
                  "category":    "",
                  "source":      "formas",
              })

          with open("formas_raw.json", "w", encoding="utf-8") as f:
              json.dump(calls, f, ensure_ascii=False, indent=2)
          print(f"✓ Formas: {len(calls)} open calls")
          PYEOF

      # ── Tillväxtverket ────────────────────────────────────────────────────
      - name: Scrape Tillväxtverket
        run: |
          python3 - <<'PYEOF'
          import requests, json, re, datetime
          from bs4 import BeautifulSoup

          today   = datetime.date.today().isoformat()
          BASE    = "https://tillvaxtverket.se"
          HEADERS = {"User-Agent": "Mozilla/5.0"}
          SV_MONTHS = {"januari":"01","februari":"02","mars":"03","april":"04","maj":"05",
                       "juni":"06","juli":"07","augusti":"08","september":"09","oktober":"10",
                       "november":"11","december":"12"}

          r = requests.get(
              f"{BASE}/tillvaxtverket/sokfinansiering/utlysningar.1139.html",
              timeout=20, headers=HEADERS)
          soup = BeautifulSoup(r.text, "lxml")

          seen       = set()
          call_links = []
          for a in soup.find_all("a", href=True):
              href = a["href"]
              if "/sokfinansiering/utlysningar/utlysningar/" not in href:
                  continue
              full_url = (BASE + href) if href.startswith("/") else href
              if full_url in seen:
                  continue
              seen.add(full_url)
              container = a
              for _ in range(4):
                  if container.parent: container = container.parent
              ct = container.get_text(" ", strip=True)
              if "Stängd" in ct:
                  continue
              h = a.find(["h3", "h2", "h4"])
              title = h.get_text(" ", strip=True) if h else a.get_text(" ", strip=True).split("\n")[0].strip()
              if not title or len(title) < 5:
                  continue
              status = "Upcoming" if "Kommande" in ct else "Open"
              is_eu  = "EU" in ct
              call_links.append((full_url, title, status, is_eu))

          print(f"Found {len(call_links)} Tillväxtverket calls")

          calls = []
          for url, title, status, is_eu in call_links:
              closes_iso = ""
              try:
                  dr  = requests.get(url, timeout=20, headers=HEADERS)
                  txt = dr.text
                  MONTHS = ("januari|februari|mars|april|maj|juni|juli|"
                            "augusti|september|oktober|november|december")
                  # Prefer patterns that are explicitly about closing
                  patterns = [
                      rf"stänger\s+den?\s+(\d{{1,2}})\s+({MONTHS})\s+(\d{{4}})",
                      rf"sista\s+ansökningsdag[^0-9]*(\d{{1,2}})\s+({MONTHS})\s+(\d{{4}})",
                      rf"stänger\s+(\d{{4}}-\d{{2}}-\d{{2}})",
                      rf"(\d{{1,2}})\s+({MONTHS})\s+(\d{{4}})",
                  ]
                  for pat in patterns:
                      m = re.search(pat, txt, re.I)
                      if not m: continue
                      if "-" in m.group(0) and len(m.groups()) == 1:
                          closes_iso = m.group(1)
                      else:
                          d, mo_sv, y = m.group(1), m.group(2).lower(), m.group(3)
                          mo = SV_MONTHS.get(mo_sv, "")
                          if mo: closes_iso = f"{y}-{mo}-{int(d):02d}"
                      break
              except Exception as e:
                  print(f"  detail error {url}: {e}")

              if closes_iso and closes_iso < today:
                  continue

              calls.append({
                  "id":          "",
                  "title":       title,
                  "title_en":    "",
                  "url":         url,
                  "opens":       "",
                  "closes":      closes_iso,
                  "status":      status,
                  "description": "",
                  "category":    "EU funding" if is_eu else "National funding",
                  "source":      "tillvaxtverket",
              })

          with open("tillvaxt_raw.json", "w", encoding="utf-8") as f:
              json.dump(calls, f, ensure_ascii=False, indent=2)
          print(f"✓ Tillväxtverket: {len(calls)} calls")
          PYEOF

      # ── Merge ─────────────────────────────────────────────────────────────
      - name: Merge all sources into data.json
        run: |
          python3 - <<'PYEOF'
          import json, datetime

          today = datetime.date.today().isoformat()

          def load(fname):
              try:
                  with open(fname, encoding="utf-8") as f:
                      return json.load(f)
              except Exception as e:
                  print(f"Warning: {fname}: {e}")
                  return []

          vinnova_calls  = load("vinnova_raw.json")
          energi_calls   = load("energi_raw.json")
          formas_calls   = load("formas_raw.json")
          tillvaxt_calls = load("tillvaxt_raw.json")

          all_calls = vinnova_calls + energi_calls + formas_calls + tillvaxt_calls
          all_calls.sort(key=lambda x: x.get("closes") or "9999-99-99")

          out = {
              "updated":        today,
              "total_open":     len(all_calls),
              "vinnova_count":  len(vinnova_calls),
              "energi_count":   len(energi_calls),
              "formas_count":   len(formas_calls),
              "tillvaxt_count": len(tillvaxt_calls),
              "calls":          all_calls,
          }
          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          print(f"✓ Vinnova={len(vinnova_calls)} Energi={len(energi_calls)} "
                f"Formas={len(formas_calls)} Tillväxt={len(tillvaxt_calls)} "
                f"TOTAL={len(all_calls)}")
          PYEOF

      # ── Translate Swedish titles ───────────────────────────────────────────
      - name: Translate Swedish titles to English
        run: |
          python3 - <<'PYEOF'
          import json
          from deep_translator import GoogleTranslator

          with open("data.json", encoding="utf-8") as f:
              data = json.load(f)

          indices = [i for i, c in enumerate(data["calls"]) if not c.get("title_en")]
          if indices:
              titles = [data["calls"][i]["title"][:499] for i in indices]
              try:
                  translated = GoogleTranslator(source="sv", target="en").translate_batch(titles)
                  for i, t in zip(indices, translated):
                      data["calls"][i]["title_en"] = t or data["calls"][i]["title"]
                  print(f"✓ Translated {len(indices)} titles")
              except Exception as e:
                  print(f"Batch translation failed, keeping originals: {e}")
                  for i in indices:
                      data["calls"][i]["title_en"] = data["calls"][i]["title"]
          else:
              print("✓ All titles already in English")

          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          PYEOF

      # ── Commit ────────────────────────────────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json vinnova_raw.json energi_raw.json formas_raw.json tillvaxt_raw.json
          git diff --staged --quiet || git commit -m "chore: update funding data $(date -u +%Y-%m-%d)"
          git push
